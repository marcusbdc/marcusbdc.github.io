<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Projects</title>
  <style>
    :root{--max-width:1100px;--gap:20px}
    html,body{height:100%;margin:0}
    body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;display:flex;align-items:center;justify-content:center;background:#fff;color:#000}
    .wrap{max-width:var(--max-width);width:100%;padding:24px;box-sizing:border-box}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:var(--gap)}
    .card{background:transparent;border:0;padding:0}
    video{width:100%;height:auto;display:block;border-radius:8px;background:#000}
    /* visually-hidden text for accessibility (not visible to visitors) */
    .sr-only{position:absolute!important;clip:rect(1px,1px,1px,1px);padding:0;border:0;height:1px;width:1px;overflow:hidden}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="card" aria-hidden="false">
        <span class="sr-only">Video 1</span>
        <video controls poster="imagearm.jpg">
          <source src="IMG_1180.mov" type="video/quicktime">
        </video>
      </div>

      <div class="card" aria-hidden="false">
        <span class="sr-only">Video 2</span>
        <video controls>
          <source src="smartherb1.jpg" type="video/mp4">
        </video>
      </div>
    </div>
  </div>
</body>
</html>
